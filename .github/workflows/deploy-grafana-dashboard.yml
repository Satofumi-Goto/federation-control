name: Deploy Grafana Dashboards

on:
  push:
    branches:
      - main
    paths:
      - 'grafana/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
      - 'scripts/deploy-runtime-workspace.mjs'
      - 'scripts/build-operational-surfaces.mjs'
      - 'scripts/build-federation-viewer-surfaces.mjs'
      - 'scripts/ensure-grafana-iframe-plugin.mjs'
      - 'scripts/build-runtime-workspace-v2.mjs'
      - 'scripts/runtime-visual-check.mjs'
      - 'scripts/diagnose-federation-iframe-sandbox.mjs'
      - 'scripts/lib/**'
  workflow_dispatch:

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Federation Viewer surfaces (legacy dashboards; does not mutate row3 routes)
        run: node scripts/build-federation-viewer-surfaces.mjs
        continue-on-error: true

      - name: Ensure Grafana IFrame panel plugin
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
        run: node scripts/ensure-grafana-iframe-plugin.mjs
        continue-on-error: true

      - name: Build Runtime Workspace router
        run: node scripts/build-runtime-workspace-v2.mjs

      - name: Validate runtime workspace JSON
        run: node -e "const d=require('./grafana/runtime-workspace-v2.json'); if(!d.uid||!Array.isArray(d.panels)) { console.error('invalid dashboard'); process.exit(1); } console.log('ok', d.uid, d.panels.length, 'panels');"

      - name: Deploy Runtime Workspace to Grafana
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          DASHBOARD_PATH: grafana/runtime-workspace-v2.json
        run: node scripts/deploy-runtime-workspace.mjs

      - name: Deploy Federation Viewer dashboards
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
        run: |
          for f in grafana/dashboards/runtime-*-federation-viewer.json; do
            DASHBOARD_PATH="$f" node scripts/deploy-runtime-workspace.mjs
          done

  visual-check:
    needs: deploy-dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Iframe sandbox diagnostics
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_GITHUB_USER: ${{ secrets.GRAFANA_GITHUB_USER }}
          GRAFANA_GITHUB_PASSWORD: ${{ secrets.GRAFANA_GITHUB_PASSWORD }}
          DIAGNOSTIC_OUT: artifacts/federation-iframe-sandbox
        run: node scripts/diagnose-federation-iframe-sandbox.mjs
        continue-on-error: true

      - name: Runtime visual verification loop
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_GITHUB_USER: ${{ secrets.GRAFANA_GITHUB_USER }}
          GRAFANA_GITHUB_PASSWORD: ${{ secrets.GRAFANA_GITHUB_PASSWORD }}
          VISUAL_CHECK_OUT: artifacts/runtime-visual-check
        run: node scripts/runtime-visual-check.mjs
        continue-on-error: true

      - name: Upload visual check artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-visual-check
          path: |
            artifacts/runtime-visual-check/
            artifacts/federation-iframe-sandbox/
          if-no-files-found: warn
