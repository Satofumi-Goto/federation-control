name: Deploy Grafana Dashboards

on:
  push:
    branches:
      - main
    paths:
      - 'dashboards/**.json'
      - 'grafana/**.json'
      - 'scripts/deploy-grafana-dashboard.mjs'
      - '.github/workflows/deploy-grafana.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate dashboard JSON
        run: |
          for file in dashboards/*.json; do
            echo "Checking $file"
            python -m json.tool "$file" > /dev/null
          done

      - name: Sync Runtime workspace dashboard
        run: |
          cp grafana/runtime-workspace-v2.json dashboards/runtime-workspace-v2.json

      - name: Deploy dashboards to Grafana
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
        run: node scripts/deploy-grafana-dashboard.mjs
