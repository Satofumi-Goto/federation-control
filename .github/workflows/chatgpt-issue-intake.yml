name: ChatGPT Issue Intake

on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  intake:
    if: github.event_name != 'issues' || contains(join(github.event.issue.labels.*.name, ','), 'chatgpt-intake')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write runtime inbox from issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.mkdirSync('.cursor/tasks', { recursive: true });
            const issue = context.payload.issue;
            const text = [
              '# ChatGPT Runtime Inbox',
              '',
              `Source issue: ${issue.html_url}`,
              '',
              issue.body || ''
            ].join('\n');
            fs.writeFileSync('.cursor/tasks/chatgpt-runtime-inbox.md', text);

      - name: Run intake runner
        run: node scripts/chatgpt-issue-intake-runner.mjs

      - name: Generate agent prompt
        run: node scripts/chatgpt-runtime-bridge.mjs --agent-prompt

      - name: Comment result
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'ChatGPT Issue Intake accepted. Runtime inbox was generated and Cursor Agent prompt was created in the workflow workspace.'
            });
