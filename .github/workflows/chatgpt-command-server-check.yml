name: ChatGPT Command Server Check

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/chatgpt-command-server.mjs
      - .github/workflows/chatgpt-command-server-check.yml

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start server and check health
        run: |
          node scripts/chatgpt-command-server.mjs &
          sleep 2
          curl -f http://localhost:8000/health
