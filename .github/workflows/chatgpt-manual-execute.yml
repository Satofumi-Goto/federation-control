name: ChatGPT Manual Execute

on:
  workflow_dispatch:
    inputs:
      request:
        description: ChatGPT implementation request
        required: false
        type: string
      issue_number:
        description: Optional GitHub issue number to use as the request source
        required: false
        type: string

permissions:
  contents: write
  issues: read

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Prepare inbox from issue
        if: inputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.mkdirSync('.cursor/tasks', { recursive: true });
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}')
            });
            fs.writeFileSync('.cursor/tasks/chatgpt-runtime-inbox.md', [
              '# ChatGPT Runtime Inbox',
              '',
              `Source issue: ${issue.html_url}`,
              '',
              issue.body || ''
            ].join('\n'));

      - name: Prepare inbox from request
        if: inputs.issue_number == ''
        run: |
          mkdir -p .cursor/tasks
          cat > .cursor/tasks/chatgpt-runtime-inbox.md <<'EOF'
          # ChatGPT Runtime Inbox

          ${{ inputs.request }}
          EOF

      - name: Generate prompt
        run: node scripts/chatgpt-runtime-bridge.mjs --agent-prompt

      - name: Execute headless runtime
        continue-on-error: true
        run: node scripts/runtime/runtimeHeadlessCursorExecutor.mjs --execute

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: chore: apply ChatGPT manual execution
